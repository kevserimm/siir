<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seninle Güzel</title>
    <meta name="description" content="Her gün değişen, sadece sana özel bir şiir ve güzel söz." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@200;300;400&display=swap"
        rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <canvas id="three-canvas"></canvas>

    <div class="site">

        <!-- HEADER -->
        <header id="hdr">
            <div class="logo-ring"><span>✦</span></div>
            <h1 class="site-title">Her şey seninle ve senin için</h1>
            <div class="date-pill">
                <span class="dot"></span>
                <span id="today-date"></span>
            </div>
        </header>

        <!-- ŞİİR -->
        <div class="divider" id="div1"><span>Bugünün Şiiri</span></div>

        <div class="card" id="poem-card">
            <div class="card-glow"></div>
            <div class="card-tag">Şiirden bir damla</div>
            <div id="poem-author"></div>
            <div id="poem-title"></div>
            <div id="poem-text"></div>
        </div>

        <!-- SÖZ -->
        <div class="divider" id="div2"><span>Bugünün Sözü</span></div>

        <div class="card" id="quote-card">
            <div class="card-glow"></div>
            <div class="card-tag">Kalpten bir söz</div>
            <span class="quote-mark">&ldquo;</span>
            <div id="quote-text"></div>
            <div id="quote-source"></div>
        </div>

        <!-- COUNTDOWN -->
        <div class="divider" id="div3"><span>Yeni Güne Kalan</span></div>

        <div class="card countdown-card" id="cd-card">
            <div class="card-glow"></div>
            <div class="countdown-label">Yeni şiir ve söz için kalan süre</div>
            <div class="cd-grid">
                <div class="cd-unit">
                    <div class="cd-num" id="cd-h">00</div>
                    <div class="cd-word">saat</div>
                </div>
                <div class="cd-sep">:</div>
                <div class="cd-unit">
                    <div class="cd-num" id="cd-m">00</div>
                    <div class="cd-word">dakika</div>
                </div>
                <div class="cd-sep">:</div>
                <div class="cd-unit">
                    <div class="cd-num" id="cd-s">00</div>
                    <div class="cd-word">saniye</div>
                </div>
            </div>
        </div>

        <footer id="ftr">Seninle olan her an, geçmişin en güzeli oldu &nbsp;<em>♥</em>&nbsp; Yarın da böyle olacak
        </footer>

    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- App -->
    <script src="script.js"></script>

</body>

</html>
